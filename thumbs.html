<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111}
.thumb{width:1280px;height:960px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;padding:70px;
  background:#08080b;font-family:'Space Mono',monospace}
.aur{position:absolute;inset:-25%;z-index:0;filter:blur(90px);opacity:.5}
.aur i{position:absolute;border-radius:50%;mix-blend-mode:screen}
.x1{width:520px;height:520px;left:-60px;top:-70px;background:radial-gradient(circle,#ff9a5a,transparent 60%)}
.x2{width:560px;height:560px;right:-90px;top:90px;background:radial-gradient(circle,#ff5e8a,transparent 60%)}
.x3{width:480px;height:480px;left:30%;bottom:-150px;background:radial-gradient(circle,#7d6bff,transparent 60%)}
.x4{width:420px;height:420px;right:8%;bottom:-80px;background:radial-gradient(circle,#4fd6c4,transparent 62%)}
.win{position:relative;z-index:2;width:1080px;border-radius:16px;overflow:hidden;border:1px solid rgba(244,241,234,.14);background:#0d0d12;box-shadow:0 50px 110px rgba(0,0,0,.6)}
.bar{height:44px;background:#15151c;display:flex;align-items:center;gap:9px;padding:0 18px;border-bottom:1px solid rgba(244,241,234,.14)}
.d{width:12px;height:12px;border-radius:50%;background:#3a3a44}
.u{margin-left:16px;font-size:13px;color:#8a8692;background:#0d0d12;border-radius:30px;padding:6px 20px}
.vp{width:100%;aspect-ratio:16/9.6;overflow:hidden}
.vp img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.lbl{position:relative;z-index:2;text-align:center}
.lbl b{font-family:'Fraunces',serif;font-weight:500;font-size:34px;color:#f4f1ea;display:block}
.lbl span{font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:#a8a49b}
</style></head><body>
<div class="thumb" id="noir"><div class="aur"><i class="x1"></i><i class="x2"></i><i class="x3"></i><i class="x4"></i></div>
  <div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span><span class="u">maisonnoir.site</span></div><div class="vp"><img src="assets/site-noir.png"></div></div>
  <div class="lbl"><b>Maison Noir</b><span>Fine dining · website design</span></div></div>
<div class="thumb" id="forge"><div class="aur"><i class="x1"></i><i class="x2"></i><i class="x3"></i><i class="x4"></i></div>
  <div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span><span class="u">forgegym.site</span></div><div class="vp"><img src="assets/site-forge.png"></div></div>
  <div class="lbl"><b>Forge Gym</b><span>Fitness · website design</span></div></div>
<div class="thumb" id="bloom"><div class="aur"><i class="x1"></i><i class="x2"></i><i class="x3"></i><i class="x4"></i></div>
  <div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span><span class="u">bloomdental.site</span></div><div class="vp"><img src="assets/site-bloom.png"></div></div>
  <div class="lbl"><b>Bloom Dental</b><span>Kids dental · website design</span></div></div>
</body></html>
