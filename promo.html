<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoundLocal promo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--ink:#08080b;--ivory:#f4f1ea;--dim:#a8a49b;--line:rgba(244,241,234,.14);--rose:#ff7d9c;
  --grad:linear-gradient(105deg,#ffd29e,#ff9a76 38%,#ff7d9c 70%,#c98bff)}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:var(--ink);color:var(--ivory);font-family:'Inter';overflow:hidden;position:relative}
.aurora{position:fixed;inset:-20%;z-index:0;filter:blur(95px);opacity:.5}
.aurora i{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 18s ease-in-out infinite}
.aurora .a1{width:620px;height:620px;left:-60px;top:-80px;background:radial-gradient(circle,#ff9a5a,transparent 60%)}
.aurora .a2{width:680px;height:680px;right:-120px;top:120px;background:radial-gradient(circle,#ff5e8a,transparent 60%);animation-delay:-6s}
.aurora .a3{width:560px;height:560px;left:35%;bottom:-180px;background:radial-gradient(circle,#7d6bff,transparent 60%);animation-delay:-11s}
.aurora .a4{width:480px;height:480px;right:10%;bottom:-100px;background:radial-gradient(circle,#4fd6c4,transparent 62%);animation-delay:-14s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,-4%) scale(1.12)}}
.scene{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;padding:90px}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
em{font-style:italic}
.brandbig{font-family:'Fraunces';font-weight:500;font-size:96px;letter-spacing:-.02em}
.brandbig em{font-weight:400}
.tag1{font-family:'Space Mono';font-size:24px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:26px}
.bigword{font-family:'Fraunces';font-weight:300;font-size:130px;line-height:.95;letter-spacing:-.025em;text-align:center}
.kicker{font-family:'Space Mono';font-size:26px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:50px}
/* browser frame */
.win{border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#0d0d12;box-shadow:0 50px 110px rgba(0,0,0,.65);width:1000px}
.bar{height:48px;background:#15151c;display:flex;align-items:center;gap:9px;padding:0 18px;border-bottom:1px solid var(--line)}
.bar .d{width:12px;height:12px;border-radius:50%;background:#3a3a44}
.bar .u{margin-left:16px;font-family:'Space Mono';font-size:14px;color:#8a8692;background:#0d0d12;border-radius:30px;padding:6px 20px}
.vp{width:100%;aspect-ratio:16/9.4;overflow:hidden}
.vp img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.s2wrap{display:flex;align-items:center;gap:70px}
.s2wrap .bigword{text-align:left;font-size:104px}
.row3{display:flex;gap:34px}
.c{width:430px}
.c .win{width:100%}.c .vp{aspect-ratio:16/10}
.c .lbl{font-family:'Space Mono';font-size:18px;color:var(--dim);margin-top:18px;text-align:center}
/* serp */
.resultcard{margin-top:54px;display:flex;align-items:center;gap:22px;background:linear-gradient(90deg,rgba(255,125,156,.18),rgba(201,139,255,.10));border:1px solid rgba(255,125,156,.4);border-radius:18px;padding:30px 40px;width:760px}
.resultcard .rk{font-family:'Space Mono';font-size:30px;color:var(--rose);font-weight:700}
.resultcard .nm{font-size:34px;font-weight:500;color:#fff}
.resultcard .ck{margin-left:auto;font-family:'Space Mono';font-size:20px;color:#7fe0b0}
/* features */
.feat{font-family:'Fraunces';font-weight:300;font-size:96px;line-height:1.12;letter-spacing:-.02em}
/* cta */
.cta-big{font-family:'Fraunces';font-weight:300;font-size:200px;line-height:.9;letter-spacing:-.03em}
.cta-link{font-family:'Space Mono';font-size:26px;letter-spacing:.1em;color:var(--dim);margin-top:46px}
</style>
</head>
<body>
<div class="aurora"><i class="a1"></i><i class="a2"></i><i class="a3"></i><i class="a4"></i></div>

<div class="scene" id="s1">
  <div class="brandbig">Found<em>Local</em></div>
  <div class="tag1">Websites that get local businesses found</div>
</div>

<div class="scene" id="s2">
  <div class="s2wrap">
    <div class="bigword">Made to<br>be <em class="grad">found.</em></div>
    <div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span><span class="u">foundlocal.site</span></div><div class="vp"><img src="assets/site-cinematic.png"></div></div>
  </div>
</div>

<div class="scene" id="s3">
  <div class="kicker">Whatever your business</div>
  <div class="row3">
    <div class="c"><div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span></div><div class="vp"><img src="assets/site-noir.png"></div></div><div class="lbl">Restaurants</div></div>
    <div class="c"><div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span></div><div class="vp"><img src="assets/site-forge.png"></div></div><div class="lbl">Gyms</div></div>
    <div class="c"><div class="win"><div class="bar"><span class="d"></span><span class="d"></span><span class="d"></span></div><div class="vp"><img src="assets/site-bloom.png"></div></div><div class="lbl">Clinics</div></div>
  </div>
</div>

<div class="scene" id="s4">
  <div class="bigword">From invisible<br>to <em class="grad">#1 on Google.</em></div>
  <div class="resultcard"><span class="rk">#1</span><span class="nm">Your business</span><span class="ck">top result ✓</span></div>
</div>

<div class="scene" id="s5">
  <div class="feat">Found on <em class="grad">Google.</em></div>
  <div class="feat">Seen by <em class="grad">AI.</em></div>
  <div class="feat">Booked on <em class="grad">WhatsApp.</em></div>
</div>

<div class="scene" id="s6">
  <div class="cta-big">Get <em class="grad">found.</em></div>
  <div class="cta-link">foundlocal — built for local business</div>
</div>

<script>
const tl=gsap.timeline({paused:true});
// S1
tl.to('#s1',{opacity:1,duration:.6},0)
  .from('#s1 .brandbig',{y:50,opacity:0,duration:1.1,ease:'expo.out'},.15)
  .from('#s1 .tag1',{y:22,opacity:0,duration:.8},.8)
  .to('#s1',{opacity:0,duration:.5},2.9);
// S2
tl.to('#s2',{opacity:1,duration:.5},3.1)
  .from('#s2 .bigword',{x:-70,opacity:0,duration:1,ease:'power3.out'},3.2)
  .from('#s2 .win',{x:90,opacity:0,duration:1.1,ease:'power3.out'},3.5)
  .to('#s2',{opacity:0,duration:.5},6.7);
// S3
tl.to('#s3',{opacity:1,duration:.5},7)
  .from('#s3 .kicker',{y:22,opacity:0,duration:.7},7.1)
  .from('#s3 .c',{y:60,opacity:0,duration:.9,stagger:.18,ease:'power3.out'},7.4)
  .to('#s3',{opacity:0,duration:.5},10.9);
// S4
tl.to('#s4',{opacity:1,duration:.5},11.2)
  .from('#s4 .bigword',{y:34,opacity:0,duration:.9,ease:'power3.out'},11.3)
  .from('#s4 .resultcard',{y:40,opacity:0,scale:.9,duration:.9,ease:'back.out(1.5)'},12.1)
  .to('#s4',{opacity:0,duration:.5},14.7);
// S5
tl.to('#s5',{opacity:1,duration:.4},15)
  .from('#s5 .feat',{y:36,opacity:0,duration:.8,stagger:.55,ease:'power3.out'},15.2)
  .to('#s5',{opacity:0,duration:.5},18.2);
// S6
tl.to('#s6',{opacity:1,duration:.5},18.5)
  .from('#s6 .cta-big',{scale:.82,opacity:0,duration:1.1,ease:'expo.out'},18.6)
  .from('#s6 .cta-link',{y:24,opacity:0,duration:.7},19.4);
window.__tl=tl;
window.__dur=21;
if(location.hash.indexOf('cap')===-1){tl.play();} // autoplay live, paused for capture
</script>
</body>
</html>
